<app-header titulo="componentes"></app-header>

<ion-content>

<ion-card>
    <ion-card-header>
      <ion-card-title>Lista de opciones</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-list>
        <ion-item>
          <ion-icon slot="start" name="person-circle-outline"></ion-icon>
          <ion-label>Perfil</ion-label>
        </ion-item>
        <ion-item>
          <ion-icon slot="start" name="settings-outline"></ion-icon>
          <ion-label>Configuración</ion-label>
        </ion-item>
        <ion-item>
          <ion-icon slot="start" name="information-circle-outline"></ion-icon>
          <ion-label>Acerca de</ion-label>
        </ion-item>
      </ion-list>
    </ion-card-content>
  </ion-card>

  <!-- 🔹 2. Accordion -->
  <ion-card>
    <ion-card-header>
      <ion-card-title>Accordion</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-accordion-group>
        <ion-accordion value="info">
          <ion-item slot="header">
            <ion-label>Ver detalles</ion-label>
          </ion-item>
          <div slot="content" class="ion-padding">
            Este es el contenido desplegable del accordion.
          </div>
        </ion-accordion>
      </ion-accordion-group>
    </ion-card-content>
  </ion-card>

  <!-- 🔹 3. Barra de progreso -->
  <ion-card>
    <ion-card-header>
      <ion-card-title>Barra de Progreso</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-progress-bar value="0.5" color="primary"></ion-progress-bar>
    </ion-card-content>
  </ion-card>

  <!-- 🔹 4. Toggle -->
  <ion-card>
    <ion-card-header>
      <ion-card-title>Interruptores (Toggle)</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-item>
        <ion-label>Activar notificaciones</ion-label>
        <ion-toggle checked></ion-toggle>
      </ion-item>

      <ion-item>
        <ion-label>Modo oscuro</ion-label>
        <ion-toggle color="dark"></ion-toggle>
      </ion-item>
    </ion-card-content>
  </ion-card>

  <!-- 🔹 5. Alert -->
  <ion-card>
    <ion-card-header>
      <ion-card-title>Alerta</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-button expand="block" color="warning" (click)="presentAlert()">
        Mostrar alerta
      </ion-button>
    </ion-card-content>
  </ion-card>
  
<ion-button> Activo</ion-button>
<ion-button [disabled]="true">Inactivo</ion-button>

<!-- Botón activo con solo borde-->
<ion-button fill="outline">Sin relleno</ion-button>
<!-- Botón activo sin texto y con icono-->
<ion-button>
  <ion-icon slot="icon-only" name="home"></ion-icon>
</ion-button>
<!-- Con 'block' se respectarán los márgenes y con 'full' se forzará llegar al
  borde de la pantalla nota:por el momento no tenemos bordes-->
<ion-button expand="block">Block</ion-button>
<ion-button expand="full">Full</ion-button>

<!-- Botón activo con forma redondeada-->
<ion-button shape="round">Redondo</ion-button>
<!--Botón activo con color secundario de la app-->
<ion-button color="secondary">Color secundario</ion-button>
</ion-content>
