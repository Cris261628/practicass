<ion-header>
<ion-toolbar>

<ion-buttons slot="start">
<ion-menu-button menu="first"></ion-menu-button>
</ion-buttons>

<ion-title>inicio</ion-title>
</ion-toolbar>
</ion-header>

<ion-content>
<ion-list>
<!--Recorremos la lista de elementos, para cada uno se crea un item que
mostrará el icono y el nombre. Al dar clic se envia al módulo seleccionado.
Detail sirve para hacer visible la flecha al final del item-->
<ion-item *ngFor="let item of elementos"
[routerLink]="item.ruta" detail>
<ion-icon name="{{item.icono}}" slot="start"></ion-icon>
{{item.nombre}}
</ion-item>
</ion-list>
</ion-content>
